<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>CRUK Therapeutics Accelerator — Prototype</title>
  <link rel="stylesheet" href="styles.css?v=11" />
  <link rel="stylesheet" href="styles_v2.css?v=107" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { background: #e7e7e9; min-height: 100vh; margin: 0; }
    .app-shell { background: #e7e7e9; min-height: 100vh; }

    /* ——— Prototype switcher bar (outside the design) ——— */
    .proto-bar {
      position: relative; z-index: 100;
      background: #0E0F24;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0 28px;
      height: 56px;
      font-family: 'Poppins', -apple-system, sans-serif;
      font-size: 13px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    .proto-bar__brand {
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-size: 11px;
      color: #00D8F0;
      margin-right: 40px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .proto-bar__brand::before {
      content: '';
      width: 8px; height: 8px;
      background: #00D8F0;
      border-radius: 50%;
      box-shadow: 0 0 0 3px rgba(0,216,240,0.2);
    }
    .proto-bar__tabs {
      display: flex;
      gap: 4px;
      height: 100%;
      align-items: center;
    }
    .proto-tab {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.6);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 18px;
      border-radius: 6px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      letter-spacing: 0.2px;
      transition: background .15s, color .15s;
      white-space: nowrap;
    }
    .proto-tab:hover { color: #fff; background: rgba(255,255,255,0.06); }
    .proto-tab.is-active { background: rgba(0,216,240,0.14); color: #00D8F0; }
    .proto-tab__badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px; height: 18px;
      padding: 0 6px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      font-variant-numeric: tabular-nums;
    }
    .proto-tab.is-active .proto-tab__badge { background: rgba(0,216,240,0.25); color: #00D8F0; }
    .proto-tab__kind {
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-left: 4px;
    }
    .proto-bar__spacer { flex: 1; }
    .proto-bar__page {
      display: inline-flex;
      gap: 2px;
      background: rgba(255,255,255,0.06);
      border-radius: 6px;
      padding: 3px;
    }
    .proto-bar__page button {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.65);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 0.2px;
    }
    .proto-bar__page button.is-active { background: #fff; color: #0E0F24; }
    .proto-bar__meta {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-left: 24px;
      font-variant-numeric: tabular-nums;
    }

    .page-wrap {
      max-width: 1440px;
      margin: 24px auto 40px;
      background: #fff;
      box-shadow: 0 4px 40px rgba(0,0,0,0.08);
    }
    .page-wrap.v2-wrap { background: #fff; }
  </style>
</head>
<body>
<div id="root"></div>

<script>
  const TWEAKS_DEFAULTS = /*EDITMODE-BEGIN*/{
    "heroStyle": "photo",
    "statsStyle": "icons",
    "variant": "v2",
    "v2HeroStyle": "fullbleed",
    "v2Tone": "quiet"
  }/*EDITMODE-END*/;
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="landing.jsx"></script>
<script type="text/babel" src="programme.jsx"></script>
<script type="text/babel" src="landing_v2.jsx"></script>
<script type="text/babel" src="programme_v2.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function TweaksPanel({ state, setState, enabled }) {
  if (!enabled) return null;
  const update = (k, v) => {
    setState(s => ({ ...s, [k]: v }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };
  return (
    <div className="tweaks-panel">
      <h3>Tweaks</h3>
      <div className="tweaks-group">
        <label>Variant</label>
        <div className="tweaks-options">
          {[
            ['v1', 'V1 · Core'],
            ['v2', 'V2 · Editorial'],
          ].map(([v,l]) => (
            <button key={v} className={state.variant===v?'active':''} onClick={()=>update('variant',v)}>{l}</button>
          ))}
        </div>
      </div>
      <div className="tweaks-group">
        <label>V2 Hero style</label>
        <div className="tweaks-options">
          {['fullbleed','split','type','offset'].map(v => (
            <button key={v} className={state.v2HeroStyle===v?'active':''} onClick={()=>update('v2HeroStyle',v)}>{v}</button>
          ))}
        </div>
      </div>
      <div className="tweaks-group">
        <label>V2 Tone</label>
        <div className="tweaks-options">
          {['quiet','punchy','image'].map(v => (
            <button key={v} className={state.v2Tone===v?'active':''} onClick={()=>update('v2Tone',v)}>{v}</button>
          ))}
        </div>
      </div>
      <div className="tweaks-group">
        <label>Hero style (V1)</label>
        <div className="tweaks-options">
          {['photo','solid','gradient','fullbleed','boxed'].map(v => (
            <button key={v} className={state.heroStyle===v?'active':''} onClick={()=>update('heroStyle',v)}>{v}</button>
          ))}
        </div>
      </div>
      <div className="tweaks-group">
        <label>Stats treatment (V1)</label>
        <div className="tweaks-options">
          {['icons','numbers','large'].map(v => (
            <button key={v} className={state.statsStyle===v?'active':''} onClick={()=>update('statsStyle',v)}>{v}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

function ProtoBar({ variant, setVariant, page, setPage }) {
  const variants = [
    { id: 'v1', label: 'V1 · Core', kind: 'Baseline' },
    { id: 'v2', label: 'V2 · Editorial', kind: 'Alt direction' },
  ];
  return (
    <div className="proto-bar">
      <span className="proto-bar__brand">Prototype</span>
      <div className="proto-bar__tabs">
        {variants.map((v, i) => (
          <button
            key={v.id}
            className={`proto-tab ${variant === v.id ? 'is-active' : ''}`}
            onClick={() => setVariant(v.id)}
          >
            <span className="proto-tab__badge">{String(i+1).padStart(2,'0')}</span>
            {v.label}
            <span className="proto-tab__kind">{v.kind}</span>
          </button>
        ))}
      </div>
      <div className="proto-bar__spacer" />
      <div className="proto-bar__page">
        <button className={page==='landing'?'is-active':''} onClick={()=>setPage('landing')}>Landing</button>
        <button className={page==='programme'?'is-active':''} onClick={()=>setPage('programme')}>Programme</button>
      </div>
    </div>
  );
}

function App() {
  const [page, setPage] = useState(() => localStorage.getItem('cruk-page') || 'landing');
  const [tweaks, setTweaks] = useState(TWEAKS_DEFAULTS);
  const [variant, setVariantState] = useState(() => localStorage.getItem('cruk-variant') || TWEAKS_DEFAULTS.variant || 'v1');
  const [editMode, setEditMode] = useState(false);

  useEffect(() => { localStorage.setItem('cruk-page', page); window.scrollTo(0,0); }, [page]);
  useEffect(() => { localStorage.setItem('cruk-variant', variant); window.scrollTo(0,0); }, [variant]);

  const setVariant = (v) => {
    setVariantState(v);
    setTweaks(s => ({ ...s, variant: v }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { variant: v } }, '*');
  };

  useEffect(() => {
    const handler = (e) => {
      if (!e.data || !e.data.type) return;
      if (e.data.type === '__activate_edit_mode') setEditMode(true);
      if (e.data.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  let pageEl;
  if (variant === 'v2') {
    pageEl = page === 'landing'
      ? <LandingPageV2 onNav={setPage} heroStyle={tweaks.v2HeroStyle} tone={tweaks.v2Tone} />
      : <ProgrammePageV2 onNav={setPage} heroStyle={tweaks.v2HeroStyle} tone={tweaks.v2Tone} />;
  } else {
    pageEl = page === 'landing'
      ? <LandingPage heroStyle={tweaks.heroStyle} statsStyle={tweaks.statsStyle} onNav={setPage} />
      : <ProgrammePage heroStyle={tweaks.heroStyle} statsStyle={tweaks.statsStyle} onNav={setPage} />;
  }

  return (
    <div className="app-shell">
      <ProtoBar variant={variant} setVariant={setVariant} page={page} setPage={setPage} />
      <div className={`page-wrap ${variant === 'v2' ? 'v2-wrap' : ''}`}>
        {pageEl}
      </div>
      <TweaksPanel state={{...tweaks, variant}} setState={setTweaks} enabled={editMode} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
