<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>CRUK Therapeutics Accelerator — Prototype</title>
  <link rel="stylesheet" href="styles.css?v=11" />
  <link rel="stylesheet" href="styles_v2.css?v=107" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { background: #e7e7e9; min-height: 100vh; margin: 0; }
    .app-shell { background: #e7e7e9; min-height: 100vh; }

    /* ——— Prototype switcher bar (outside the design) ——— */
    .proto-bar {
      position: relative; z-index: 100;
      background: #0E0F24;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0 28px;
      height: 56px;
      font-family: 'Poppins', -apple-system, sans-serif;
      font-size: 13px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    .proto-bar__brand {
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-size: 11px;
      color: #5C24B2;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .proto-bar__brand::before {
      content: '';
      width: 8px; height: 8px;
      background: #5C24B2;
      border-radius: 50%;
      box-shadow: 0 0 0 3px rgba(92,36,178,0.25);
    }
    .proto-bar__spacer { flex: 1; }
    .proto-bar__page {
      display: inline-flex;
      gap: 2px;
      background: rgba(255,255,255,0.06);
      border-radius: 6px;
      padding: 3px;
    }
    .proto-bar__page button {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.65);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 0.2px;
    }
    .proto-bar__page button.is-active { background: #fff; color: #0E0F24; }

    .page-wrap {
      max-width: 1440px;
      margin: 24px auto 40px;
      background: #fff;
      box-shadow: 0 4px 40px rgba(0,0,0,0.08);
    }
  </style>
</head>
<body>
<div id="root"></div>

<script>
  const TWEAKS_DEFAULTS = /*EDITMODE-BEGIN*/{
    "v2HeroStyle": "fullbleed",
    "v2Tone": "quiet"
  }/*EDITMODE-END*/;
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="landing_v2.jsx"></script>
<script type="text/babel" src="programme_v2.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function TweaksPanel({ state, setState, enabled }) {
  if (!enabled) return null;
  const update = (k, v) => {
    setState(s => ({ ...s, [k]: v }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };
  return (
    <div className="tweaks-panel">
      <h3>Tweaks</h3>
      <div className="tweaks-group">
        <label>Hero style</label>
        <div className="tweaks-options">
          {['fullbleed','split','type','offset'].map(v => (
            <button key={v} className={state.v2HeroStyle===v?'active':''} onClick={()=>update('v2HeroStyle',v)}>{v}</button>
          ))}
        </div>
      </div>
      <div className="tweaks-group">
        <label>Tone</label>
        <div className="tweaks-options">
          {['quiet','punchy','image'].map(v => (
            <button key={v} className={state.v2Tone===v?'active':''} onClick={()=>update('v2Tone',v)}>{v}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

function ProtoBar({ page, setPage }) {
  return (
    <div className="proto-bar">
      <span className="proto-bar__brand">Prototype</span>
      <div className="proto-bar__spacer" />
      <div className="proto-bar__page">
        <button className={page==='landing'?'is-active':''} onClick={()=>setPage('landing')}>Landing</button>
        <button className={page==='programme'?'is-active':''} onClick={()=>setPage('programme')}>Programme</button>
      </div>
    </div>
  );
}

function App() {
  const [page, setPage] = useState(() => localStorage.getItem('cruk-page') || 'landing');
  const [tweaks, setTweaks] = useState(TWEAKS_DEFAULTS);
  const [editMode, setEditMode] = useState(false);

  useEffect(() => { localStorage.setItem('cruk-page', page); window.scrollTo(0,0); }, [page]);

  useEffect(() => {
    const handler = (e) => {
      if (!e.data || !e.data.type) return;
      if (e.data.type === '__activate_edit_mode') setEditMode(true);
      if (e.data.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const pageEl = page === 'landing'
    ? <LandingPageV2 onNav={setPage} heroStyle={tweaks.v2HeroStyle} tone={tweaks.v2Tone} />
    : <ProgrammePageV2 onNav={setPage} heroStyle={tweaks.v2HeroStyle} tone={tweaks.v2Tone} />;

  return (
    <div className="app-shell">
      <ProtoBar page={page} setPage={setPage} />
      <div className="page-wrap">
        {pageEl}
      </div>
      <TweaksPanel state={tweaks} setState={setTweaks} enabled={editMode} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
