<script>
  const TWEAKS_DEFAULTS = /*EDITMODE-BEGIN*/{
    "v2HeroStyle": "fullbleed",
    "v2Tone": "quiet"
  }/*EDITMODE-END*/;
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useEffect } = React;


const PAGES = [
  { id: 'landing',   label: 'Landing' },
  { id: 'programme', label: 'Programme' },
  { id: 'styles',    label: 'Styles' },
];

const VIEWPORTS = [
  { id: 'mobile',  label: 'Mobile',  icon: 'smartphone' },
  { id: 'tablet',  label: 'Tablet',  icon: 'tablet' },
  { id: 'desktop', label: 'Desktop', icon: 'desktop_windows' },
];

function ProtoBar({ page, setPage, viewport, setViewport }) {
  return (
    <div className="proto-bar" role="tablist" aria-label="Prototype pages">
      <span className="proto-bar__brand">Prototype</span>
      <div className="proto-bar__tabs" role="tablist">
        {PAGES.map(p => (
          <button
            key={p.id}
            role="tab"
            aria-selected={p.id === page}
            className={'proto-tab' + (p.id === page ? ' is-active' : '')}
            onClick={() => setPage(p.id)}
          >{p.label}</button>
        ))}
      </div>
      <div className="proto-bar__spacer" />
      <div className="proto-viewport" role="group" aria-label="Viewport size">
        {VIEWPORTS.map(v => (
          <button
            key={v.id}
            type="button"
            aria-pressed={v.id === viewport}
            className={'proto-viewport__btn' + (v.id === viewport ? ' is-active' : '')}
            onClick={() => setViewport(v.id)}
            title={v.label}
          >
            <span className="material-symbols-outlined">{v.icon}</span>
            <span className="proto-viewport__label">{v.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [page, setPage] = useState(() => localStorage.getItem('cruk-page') || 'landing');
  const [viewport, setViewport] = useState(() => localStorage.getItem('cruk-viewport') || 'desktop');
  const [tweaks, setTweaks] = useState(TWEAKS_DEFAULTS);
  const [editMode, setEditMode] = useState(false);

  useEffect(() => { localStorage.setItem('cruk-page', page); window.scrollTo(0, 0); }, [page]);
  useEffect(() => { localStorage.setItem('cruk-viewport', viewport); }, [viewport]);

  useEffect(() => {
    const handler = (e) => {
      if (!e.data || !e.data.type) return;
      if (e.data.type === '__activate_edit_mode') setEditMode(true);
      if (e.data.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  let pageEl;
  if (page === 'landing') {
    pageEl = <LandingPageV2 onNav={setPage} heroStyle={tweaks.v2HeroStyle} tone={tweaks.v2Tone} />;
  } else if (page === 'programme') {
    pageEl = <ProgrammePageV2 onNav={setPage} heroStyle={tweaks.v2HeroStyle} tone={tweaks.v2Tone} />;
  } else {
    pageEl = <StylesPage />;
  }

  return (
    <div className="app-shell">
      <ProtoBar page={page} setPage={setPage} viewport={viewport} setViewport={setViewport} />
      <div className={'proto-stage proto-stage--' + viewport}>
        <div className="proto-stage__frame">
          {pageEl}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
/* Subtle parallax — shift background-position on hero + feature images */
(function () {
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const SELECTORS = '.v2h-full__bg, .v2h-poster__photo, .v2h-split__img, .v2h-offset__bg, .hero--photo .hero__bg';
  // background-position-y travels between 35% and 65% as element passes viewport.
  let rafId = null;
  function update() {
    rafId = null;
    const vh = window.innerHeight || document.documentElement.clientHeight;
    document.querySelectorAll(SELECTORS).forEach(el => {
      const rect = el.getBoundingClientRect();
      if (rect.bottom < 0 || rect.top > vh) return;
      const center = rect.top + rect.height / 2;
      let progress = (center - vh / 2) / (vh / 2 + rect.height / 2);
      progress = Math.max(-1, Math.min(1, progress));
      // map -1..1 → 35..65 percent
      const y = 50 + progress * 25;
      el.style.setProperty('background-position-y', y.toFixed(1) + '%', 'important');
      el.style.setProperty('background-position-x', 'center', 'important');
      /* let CSS control background-size for parallax slack */
      el.style.willChange = 'background-position';
    });
  }
  function onScroll() { if (rafId == null) rafId = requestAnimationFrame(update); }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll);
  let tries = 0;
  (function poll() { update(); if (tries++ < 20) setTimeout(poll, 200); })();
})();


  /* Carousel progress — update --carousel-progress var on .v2-apply */
  (function () {
    function setup() {
      const list = document.querySelector('#apply .v2-apply__list');
      const apply = document.querySelector('#apply');
      if (!list || !apply) return false;
      let raf = null;
      function update() {
        raf = null;
        const max = list.scrollWidth - list.clientWidth;
        const p = max > 0 ? list.scrollLeft / max : 0;
        apply.style.setProperty('--carousel-progress', p.toFixed(3));
      }
      list.addEventListener('scroll', () => { if (!raf) raf = requestAnimationFrame(update); }, { passive: true });
      window.addEventListener('resize', update);
      update();
      return true;
    }
    let tries = 0;
    (function poll() {
      if (setup()) return;
      if (tries++ < 40) setTimeout(poll, 250);
    })();
  })();

</script>


<script>
/* Pointer-drag for inc + elig carousels */
(function () {
  function attach(list) {
    if (!list || list.dataset.dragAttached) return;
    list.dataset.dragAttached = '1';
    let isDown = false, startX = 0, startScroll = 0, moved = false;
    list.addEventListener('pointerdown', (e) => {
      if (e.pointerType === 'mouse' && e.button !== 0) return;
      isDown = true; moved = false;
      startX = e.clientX;
      startScroll = list.scrollLeft;
      list.setPointerCapture(e.pointerId);
      list.style.cursor = 'grabbing';
      list.style.scrollSnapType = 'none';
    });
    let lastX = 0, lastT = 0, velocity = 0;
      list.addEventListener('pointermove', (e) => {
        if (!isDown) return;
        const dx = e.clientX - startX;
        if (Math.abs(dx) > 4) moved = true;
        // Track velocity for momentum
        const now = performance.now();
        if (lastT) {
          const dt = now - lastT;
          if (dt > 0) velocity = (e.clientX - lastX) / dt;
        }
        lastX = e.clientX; lastT = now;
        list.scrollLeft = startScroll - dx;
      });
    function release(e) {
      if (!isDown) return;
      isDown = false;
      list.style.cursor = '';
      list.style.scrollSnapType = '';
      const item = list.firstElementChild;
      if (item) {
        const w = item.getBoundingClientRect().width + parseFloat(getComputedStyle(list).columnGap || '0');
        // Apply momentum: project ~150ms further
        const momentum = velocity * -150;
        const targetLeft = list.scrollLeft + momentum;
        const idx = Math.round(targetLeft / w);
        const clamped = Math.max(0, Math.min(idx, list.children.length - 1));
        list.scrollTo({ left: clamped * w, behavior: 'smooth' });
      }
      velocity = 0; lastT = 0;
      if (moved) {
        const cancelClick = (ev) => { ev.preventDefault(); ev.stopPropagation(); list.removeEventListener('click', cancelClick, true); };
        list.addEventListener('click', cancelClick, true);
      }
    }
    list.addEventListener('pointerup', release);
    list.addEventListener('pointercancel', release);
    list.addEventListener('pointerleave', release);
    list.style.cursor = 'grab';
  }
  let tries = 0;
  (function tick() {
    attach(document.querySelector('.v2-inc__grid'));
    attach(document.querySelector('.v2-elig__grid'));
    if (tries++ < 40) setTimeout(tick, 300);
  })();
})();
</script>


<script>
/* Carousel pips — render under .v2-inc__grid and .v2-elig__grid */
(function () {
  function setup(grid) {
    if (!grid || grid.dataset.pipsAttached) return;
    grid.dataset.pipsAttached = '1';
    const items = Array.from(grid.children);
    if (items.length < 2) return;

    function calcPages() {
      const w = items[0].getBoundingClientRect().width + parseFloat(getComputedStyle(grid).columnGap || '0');
      const totalScroll = grid.scrollWidth - grid.clientWidth;
      if (totalScroll <= 0 || w <= 0) return { count: 1, w: w };
      const pages = Math.round(totalScroll / w) + 1;
      return { count: pages, w: w };
    }

    const pips = document.createElement('div');
    pips.className = 'v2-pips';
    const row = document.createElement('div');
    row.className = 'v2-carousel-controls';

    const prev = document.createElement('button');
    prev.type = 'button';
    prev.className = 'v2-carousel-arrow';
    prev.setAttribute('aria-label', 'Previous');
    prev.innerHTML = '<span class="material-symbols-outlined">arrow_back</span>';
    const next = document.createElement('button');
    next.type = 'button';
    next.className = 'v2-carousel-arrow';
    next.setAttribute('aria-label', 'Next');
    next.innerHTML = '<span class="material-symbols-outlined">arrow_forward</span>';
    function step(dir) {
      const { w } = calcPages();
      const idx = Math.round(grid.scrollLeft / w);
      grid.scrollTo({ left: Math.max(0, idx + dir) * w, behavior: 'smooth' });
    }
    prev.addEventListener('click', () => step(-1));
    next.addEventListener('click', () => step(1));
    row.appendChild(prev);
    row.appendChild(pips);
    row.appendChild(next);
    grid.insertAdjacentElement('afterend', row);

    function render() {
      const { count, w } = calcPages();
      // Rebuild pips if count changed
      if (pips.children.length !== count) {
        pips.innerHTML = '';
        for (let i = 0; i < count; i++) {
          const d = document.createElement('span');
          d.className = 'v2-pips__dot';
          d.addEventListener('click', () => grid.scrollTo({ left: i * w, behavior: 'smooth' }));
          pips.appendChild(d);
        }
      }
      const idx = w > 0 ? Math.round(grid.scrollLeft / w) : 0;
      pips.querySelectorAll('.v2-pips__dot').forEach((d, i) => d.classList.toggle('is-active', i === idx));
    }
    grid.addEventListener('scroll', () => requestAnimationFrame(render), { passive: true });
    window.addEventListener('resize', render);
    render();
  }
  let tries = 0;
  (function tick() {
    setup(document.querySelector('.v2-inc__grid'));
    setup(document.querySelector('.v2-elig__grid'));
    if (tries++ < 40) setTimeout(tick, 300);
  })();
})();
</script>
